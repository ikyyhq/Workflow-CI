name: MLflow CI Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install mlflow pandas scikit-learn virtualenv

      - name: Run mlflow project
        run: |
          mlflow run MLProject/ --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          # Biarkan step ini berjalan agar namanya muncul di log kriteria
          RUN_ID=$(basename "$(ls -td mlruns/0/* | head -1)")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib pydrive2

      # Gagal memcoba
      # - name: Upload to Google Drive
      #   env:
      #     GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
      #   run: |
      #     # Arahkan script langsung ke folder 'saved_model' yang PASTI ada
      #     python scripts/upload_to_gdrive.py MLProject/saved_model

      # Menganti simpan artifak di github
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: heart-failure-model-artifact
          path: MLProject/saved_model/

      - name: Build Docker Model
        run: |
          # Docker build juga kita arahkan ke 'saved_model'
          mlflow models build-docker -m MLProject/saved_model -n ml-model-image

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} 

      - name: Tag Docker Image
        run: |
          docker tag ml-model-image ${{ secrets.DOCKER_USERNAME }}/heart-failure-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/heart-failure-model:latest